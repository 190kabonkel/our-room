<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comments</title>
</head>
<body>

  <h2>Comments</h2>

  <div id="comment-form">
    <input type="text" id="username-input" placeholder="Your name" size="20">
    <br><br>
    <textarea id="comment-input" placeholder="Write a comment..." rows="3" cols="50"></textarea>
    <br>
    <button onclick="postComment()">Post Comment</button>
    <p id="error-msg" style="color:red;"></p>
  </div>

  <hr>

  <div id="comments-count"></div>
  <div id="comments-list"><p>Loading comments...</p></div>

  <script>
    const SUPABASE_URL = 'https://zzkfmppgtjtvxynjuway.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_yYIhvDx0df2Wh11dq7oYxA_DjJbzflJ';

    async function apiFetch(path, options = {}) {
      const res = await fetch(SUPABASE_URL + path, {
        ...options,
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation',
          ...(options.headers || {})
        }
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }
      return res.json();
    }

    async function loadComments() {
      try {
        const data = await apiFetch('/rest/v1/comments?order=created_at.desc');
        renderComments(data);
      } catch (e) {
        document.getElementById('comments-list').innerHTML = '<p style="color:red;">Failed to load comments. Make sure the table exists in Supabase.</p>';
        console.error(e);
      }
    }

    async function postComment() {
      const username = document.getElementById('username-input').value.trim();
      const text = document.getElementById('comment-input').value.trim();
      const errorMsg = document.getElementById('error-msg');

      if (!username) { errorMsg.textContent = 'Please enter your name.'; return; }
      if (!text) { errorMsg.textContent = 'Please write a comment.'; return; }
      errorMsg.textContent = '';

      try {
        await apiFetch('/rest/v1/comments', {
          method: 'POST',
          body: JSON.stringify({ username, text, likes: 0 })
        });
        document.getElementById('comment-input').value = '';
        loadComments();
      } catch (e) {
        errorMsg.textContent = 'Failed to post comment.';
        console.error(e);
      }
    }

    async function likeComment(id, currentLikes) {
      try {
        await apiFetch('/rest/v1/comments?id=eq.' + id, {
          method: 'PATCH',
          body: JSON.stringify({ likes: currentLikes + 1 })
        });
        loadComments();
      } catch (e) {
        console.error(e);
      }
    }

    async function deleteComment(id) {
      try {
        await apiFetch('/rest/v1/comments?id=eq.' + id, {
          method: 'DELETE',
          headers: { 'Prefer': '' }
        });
        loadComments();
      } catch (e) {
        console.error(e);
      }
    }

    function renderComments(comments) {
      const list = document.getElementById('comments-list');
      const countEl = document.getElementById('comments-count');

      countEl.textContent = comments.length + ' comment(s)';

      if (comments.length === 0) {
        list.innerHTML = '<p>No comments yet. Be the first!</p>';
        return;
      }

      list.innerHTML = comments.map(comment => `
        <div style="border:1px solid black; padding:8px; margin:8px 0;">
          <strong>${escapeHtml(comment.username)}</strong>
          <small> — ${new Date(comment.created_at).toLocaleString()}</small>
          <p>${escapeHtml(comment.text)}</p>
          <button onclick="likeComment(${comment.id}, ${comment.likes})">👍 Like (${comment.likes})</button>
          <button onclick="deleteComment(${comment.id})">🗑 Delete</button>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadComments();
  </script>

</body>
</html>
